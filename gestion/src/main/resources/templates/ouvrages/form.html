<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ouvrage - Formulaire</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #F7F6E5; font-family: 'Segoe UI', sans-serif; }
        .navbar { background-color: #36064D !important; }
        .navbar-brand, .nav-link { color: #F7F6E5 !important; font-weight: 600; }
        .nav-link:hover { color: #76D2DB !important; }
        .form-card {
            background: white; border-radius: 20px;
            box-shadow: 0 10px 40px rgba(54,6,77,0.15);
            padding: 40px; max-width: 600px;
            margin: 40px auto;
        }
        .form-title { color: #36064D; font-weight: 700; font-size: 24px; margin-bottom: 25px; text-align: center; }
        .form-label { color: #36064D; font-weight: 600; }
        .form-control, .form-select {
            border: 2px solid #e0e0e0;
            border-radius: 10px; padding: 10px 14px;
        }
        .form-control:focus, .form-select:focus { border-color: #76D2DB; box-shadow: 0 0 0 3px rgba(118,210,219,0.3); }
        .btn-save {
            background: linear-gradient(135deg, #36064D, #76D2DB);
            color: white; border: none; border-radius: 10px;
            padding: 12px; font-weight: 700; font-size: 16px;
            width: 100%; transition: 0.3s;
        }
        .btn-save:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-cancel {
            background-color: #DA4848; color: white;
            border: none; border-radius: 10px;
            padding: 12px; font-weight: 700;
            width: 100%; text-decoration: none;
            display: block; text-align: center;
            transition: 0.3s; margin-top: 10px;
        }
        .btn-cancel:hover { background-color: #36064D; color: white; }
        .error { color: #DA4848; font-size: 13px; margin-top: 4px; }
        footer { background-color: #36064D; color: #F7F6E5; text-align: center; padding: 15px; margin-top: 50px; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="/"><i class="bi bi-book-half"></i> BiblioGestion</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/ecrivains"><i class="bi bi-person-lines-fill"></i> Écrivains</a></li>
                <li class="nav-item"><a class="nav-link" href="/ouvrages"><i class="bi bi-journals"></i> Ouvrages</a></li>
                <li class="nav-item"><a class="nav-link" href="/prets"><i class="bi bi-arrow-left-right"></i> Prêts</a></li>
                <li class="nav-item"><a class="nav-link" href="/prets/stats"><i class="bi bi-bar-chart-fill"></i> Statistiques</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <div class="form-card">
        <div class="form-title">
            <i class="bi bi-journals" style="color:#76D2DB"></i>
            <span th:text="${ouvrage.id == null ? 'Nouvel Ouvrage' : 'Modifier Ouvrage'}"></span>
        </div>
        <form th:action="@{/ouvrages/save}" th:object="${ouvrage}" method="post">
            <input type="hidden" th:field="*{id}">
            <div class="mb-3">
                <label class="form-label">Désignation</label>
                <input type="text" th:field="*{designation}" class="form-control" placeholder="Ex: Les Misérables">
                <span class="error" th:if="${#fields.hasErrors('designation')}" th:errors="*{designation}"></span>
            </div>
            <div class="mb-3">
                <label class="form-label">Code Ouvrage</label>
                <input type="text" th:field="*{codeOuvrage}" class="form-control" placeholder="Ex: LIV-001">
                <span class="error" th:if="${#fields.hasErrors('codeOuvrage')}" th:errors="*{codeOuvrage}"></span>
            </div>
            <div class="mb-3">
                <label class="form-label">Genre</label>
                <input type="text" th:field="*{genre}" class="form-control" placeholder="Ex: Roman, Science-Fiction...">
                <span class="error" th:if="${#fields.hasErrors('genre')}" th:errors="*{genre}"></span>
            </div>
            <div class="mb-3">
                <label class="form-label">Année d'édition</label>
                <input type="date" th:field="*{anneeEdition}" class="form-control">
                <span class="error" th:if="${#fields.hasErrors('anneeEdition')}" th:errors="*{anneeEdition}"></span>
            </div>
            <div class="mb-3">
                <label class="form-label">Écrivain</label>
                <select th:field="*{ecrivain}" class="form-select">
                    <option value="">-- Sélectionner un écrivain --</option>
                    <option th:each="e : ${ecrivains}"
                            th:value="${e.id}"
                            th:text="${e.nom}"
                            th:selected="${ouvrage.ecrivain != null && ouvrage.ecrivain.id == e.id}">
                    </option>
                </select>
            </div>
            <div class="mb-4 form-check">
                <input type="checkbox" th:field="*{estDisponible}" class="form-check-input" id="estDisponible">
                <label class="form-check-label" for="estDisponible" style="color:#36064D; font-weight:600;">Disponible</label>
            </div>
            <button type="submit" class="btn-save"><i class="bi bi-check-lg"></i> Enregistrer</button>
            <a href="/ouvrages" class="btn-cancel"><i class="bi bi-x-lg"></i> Annuler</a>
        </form>
    </div>
</div>

<footer><p>📚 BiblioGestion — Développé avec Spring Boot & Thymeleaf</p></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
