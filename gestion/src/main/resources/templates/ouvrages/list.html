<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ouvrages</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body { background-color: #F7F6E5; font-family: 'Segoe UI', sans-serif; }
        .navbar { background-color: #36064D !important; }
        .navbar-brand, .nav-link { color: #F7F6E5 !important; font-weight: 600; }
        .nav-link:hover { color: #76D2DB !important; }
        .page-header {
            background: linear-gradient(135deg, #36064D, #76D2DB);
            color: white; padding: 25px 30px;
            border-radius: 16px; margin: 25px 0;
        }
        .card { border: none; border-radius: 16px; box-shadow: 0 4px 15px rgba(54,6,77,0.1); }
        .table thead { background-color: #36064D; color: #F7F6E5; }
        .table tbody tr:hover { background-color: #e8f8f9; }
        .btn-primary-custom {
            background-color: #76D2DB; border: none;
            color: #36064D; font-weight: 700;
            border-radius: 10px; padding: 8px 20px;
            text-decoration: none; transition: 0.3s;
        }
        .btn-primary-custom:hover { background-color: #36064D; color: white; }
        .btn-edit {
            background-color: #76D2DB; color: #36064D;
            border: none; border-radius: 8px;
            padding: 5px 12px; font-weight: 600;
            text-decoration: none; transition: 0.3s;
        }
        .btn-edit:hover { background-color: #36064D; color: white; }
        .btn-delete {
            background-color: #DA4848; color: white;
            border: none; border-radius: 8px;
            padding: 5px 12px; font-weight: 600;
            text-decoration: none; transition: 0.3s;
        }
        .btn-delete:hover { background-color: #36064D; color: white; }
        .btn-toggle-dispo {
            background-color: #36064D; color: white;
            border: none; border-radius: 8px;
            padding: 5px 12px; font-weight: 600;
            text-decoration: none; transition: 0.3s;
        }
        .btn-toggle-dispo:hover { background-color: #76D2DB; color: #36064D; }
        .badge-dispo { background-color: #76D2DB; color: #36064D; font-weight: 700; border-radius: 8px; padding: 4px 10px; }
        .badge-indispo { background-color: #DA4848; color: white; font-weight: 700; border-radius: 8px; padding: 4px 10px; }
        .search-bar { background: white; border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(54,6,77,0.1); }
        .form-control:focus, .form-select:focus { border-color: #76D2DB; box-shadow: 0 0 0 3px rgba(118,210,219,0.3); }
        footer { background-color: #36064D; color: #F7F6E5; text-align: center; padding: 15px; margin-top: 50px; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="/"><i class="bi bi-book-half"></i> BiblioGestion</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/ecrivains"><i class="bi bi-person-lines-fill"></i> Écrivains</a></li>
                <li class="nav-item"><a class="nav-link" href="/ouvrages"><i class="bi bi-journals"></i> Ouvrages</a></li>
                <li class="nav-item"><a class="nav-link" href="/prets"><i class="bi bi-arrow-left-right"></i> Prêts</a></li>
                <li class="nav-item"><a class="nav-link" href="/prets/stats"><i class="bi bi-bar-chart-fill"></i> Statistiques</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <div class="page-header d-flex justify-content-between align-items-center">
        <h2><i class="bi bi-journals"></i> Catalogue des Ouvrages</h2>
        <a href="/ouvrages/new" class="btn-primary-custom"><i class="bi bi-plus-lg"></i> Nouvel Ouvrage</a>
    </div>

    <!-- FILTRES -->
    <div class="search-bar">
        <form method="get" action="/ouvrages" class="row g-3">
            <div class="col-md-3">
                <input type="text" name="designation" class="form-control" placeholder="🔍 Titre...">
            </div>
            <div class="col-md-3">
                <input type="text" name="genre" class="form-control" placeholder="📂 Genre...">
            </div>
            <div class="col-md-3">
                <select name="estDisponible" class="form-select">
                    <option value="">📋 Disponibilité...</option>
                    <option value="true">✅ Disponible</option>
                    <option value="false">❌ Indisponible</option>
                </select>
            </div>
            <div class="col-md-3">
                <select name="ecrivainId" class="form-select">
                    <option value="">✍️ Écrivain...</option>
                    <option th:each="e : ${ecrivains}" th:value="${e.id}" th:text="${e.nom}"></option>
                </select>
            </div>
            <div class="col-12 text-end">
                <button type="submit" class="btn" style="background-color:#76D2DB; color:#36064D; font-weight:700; border-radius:10px; padding: 8px 25px;">
                    <i class="bi bi-funnel"></i> Filtrer
                </button>
                <a href="/ouvrages" class="btn ms-2" style="background-color:#36064D; color:white; font-weight:700; border-radius:10px; padding: 8px 25px;">
                    <i class="bi bi-x-circle"></i> Réinitialiser
                </a>
            </div>
        </form>
    </div>

    <!-- TABLE -->
    <div class="card">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead>
                <tr>
                    <th>#</th>
                    <th>Désignation</th>
                    <th>Code</th>
                    <th>Genre</th>
                    <th>Écrivain</th>
                    <th>Édition</th>
                    <th>Disponibilité</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="ouvrage : ${ouvrages}">
                    <td th:text="${ouvrage.id}"></td>
                    <td th:text="${ouvrage.designation}"></td>
                    <td th:text="${ouvrage.codeOuvrage}"></td>
                    <td th:text="${ouvrage.genre}"></td>
                    <td th:text="${ouvrage.ecrivain != null ? ouvrage.ecrivain.nom : '-'}"></td>
                    <td th:text="${ouvrage.anneeEdition}"></td>
                    <td>
                        <span th:if="${ouvrage.estDisponible}" class="badge-dispo">✅ Disponible</span>
                        <span th:unless="${ouvrage.estDisponible}" class="badge-indispo">❌ Indisponible</span>
                    </td>
                    <td>
                        <a th:href="@{/ouvrages/edit/{id}(id=${ouvrage.id})}" class="btn-edit me-1"><i class="bi bi-pencil"></i></a>
                        <a th:href="@{/ouvrages/toggle/{id}(id=${ouvrage.id})}" class="btn-toggle-dispo me-1"><i class="bi bi-arrow-repeat"></i></a>
                        <a th:href="@{/ouvrages/delete/{id}(id=${ouvrage.id})}" class="btn-delete" onclick="return confirm('Supprimer cet ouvrage ?')"><i class="bi bi-trash"></i></a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(ouvrages)}">
                    <td colspan="8" class="text-center py-4 text-muted">Aucun ouvrage trouvé</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<footer><p>📚 BiblioGestion — Développé avec Spring Boot & Thymeleaf</p></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
