<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Prêts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body { background-color: #F7F6E5; font-family: 'Segoe UI', sans-serif; }
        .navbar { background-color: #36064D !important; }
        .navbar-brand, .nav-link { color: #F7F6E5 !important; font-weight: 600; }
        .nav-link:hover { color: #76D2DB !important; }
        .page-header {
            background: linear-gradient(135deg, #DA4848, #36064D);
            color: white; padding: 25px 30px;
            border-radius: 16px; margin: 25px 0;
        }
        .card { border: none; border-radius: 16px; box-shadow: 0 4px 15px rgba(54,6,77,0.1); }
        .table thead { background-color: #36064D; color: #F7F6E5; }
        .table tbody tr:hover { background-color: #e8f8f9; }
        .btn-primary-custom {
            background-color: #76D2DB; border: none;
            color: #36064D; font-weight: 700;
            border-radius: 10px; padding: 8px 20px;
            text-decoration: none; transition: 0.3s;
        }
        .btn-primary-custom:hover { background-color: #F7F6E5; color: #36064D; }
        .btn-retour {
            background-color: #76D2DB; color: #36064D;
            border: none; border-radius: 8px;
            padding: 5px 12px; font-weight: 600;
            text-decoration: none; transition: 0.3s;
        }
        .btn-retour:hover { background-color: #36064D; color: white; }
        .btn-delete {
            background-color: #DA4848; color: white;
            border: none; border-radius: 8px;
            padding: 5px 12px; font-weight: 600;
            text-decoration: none; transition: 0.3s;
        }
        .btn-delete:hover { background-color: #36064D; color: white; }
        .badge-encours { background-color: #76D2DB; color: #36064D; font-weight: 700; border-radius: 8px; padding: 4px 10px; }
        .badge-rendu { background-color: #36064D; color: white; font-weight: 700; border-radius: 8px; padding: 4px 10px; }
        .badge-retard { background-color: #DA4848; color: white; font-weight: 700; border-radius: 8px; padding: 4px 10px; }
        .search-bar { background: white; border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(54,6,77,0.1); }
        .form-select:focus { border-color: #76D2DB; box-shadow: 0 0 0 3px rgba(118,210,219,0.3); }
        footer { background-color: #36064D; color: #F7F6E5; text-align: center; padding: 15px; margin-top: 50px; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="/"><i class="bi bi-book-half"></i> BiblioGestion</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/ecrivains"><i class="bi bi-person-lines-fill"></i> Écrivains</a></li>
                <li class="nav-item"><a class="nav-link" href="/ouvrages"><i class="bi bi-journals"></i> Ouvrages</a></li>
                <li class="nav-item"><a class="nav-link" href="/prets"><i class="bi bi-arrow-left-right"></i> Prêts</a></li>
                <li class="nav-item"><a class="nav-link" href="/prets/stats"><i class="bi bi-bar-chart-fill"></i> Statistiques</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <div class="page-header d-flex justify-content-between align-items-center">
        <h2><i class="bi bi-arrow-left-right"></i> Gestion des Prêts</h2>
        <a href="/prets/new" class="btn-primary-custom"><i class="bi bi-plus-lg"></i> Nouveau Prêt</a>
    </div>

    <!-- FILTRES -->
    <div class="search-bar">
        <form method="get" action="/prets" class="row g-3 align-items-end">
            <div class="col-md-4">
                <label class="form-label fw-bold" style="color:#36064D">Filtrer par état</label>
                <select name="etat" class="form-select">
                    <option value="">📋 Tous les prêts</option>
                    <option value="EN_COURS">🔵 En cours</option>
                    <option value="RENDU">🟢 Rendu</option>
                    <option value="EN_RETARD">🔴 En retard</option>
                </select>
            </div>
            <div class="col-md-3">
                <button type="submit" class="btn w-100" style="background-color:#76D2DB; color:#36064D; font-weight:700; border-radius:10px;">
                    <i class="bi bi-funnel"></i> Filtrer
                </button>
            </div>
            <div class="col-md-3">
                <a href="/prets" class="btn w-100" style="background-color:#36064D; color:white; font-weight:700; border-radius:10px;">
                    <i class="bi bi-x-circle"></i> Réinitialiser
                </a>
            </div>
            <div class="col-md-2">
                <a href="/prets/stats" class="btn w-100" style="background-color:#DA4848; color:white; font-weight:700; border-radius:10px;">
                    <i class="bi bi-bar-chart"></i> Stats
                </a>
            </div>
        </form>
    </div>

    <!-- TABLE -->
    <div class="card">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead>
                <tr>
                    <th>#</th>
                    <th>Ouvrage</th>
                    <th>Date Prêt</th>
                    <th>Date Échéance</th>
                    <th>Date Rendu</th>
                    <th>État</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="pret : ${prets}">
                    <td th:text="${pret.id}"></td>
                    <td th:text="${pret.ouvrage != null ? pret.ouvrage.designation : '-'}"></td>
                    <td th:text="${pret.datePret}"></td>
                    <td th:text="${pret.dateEcheance}"></td>
                    <td th:text="${pret.dateRendu != null ? pret.dateRendu : '-'}"></td>
                    <td>
                        <span th:if="${pret.etat == 'EN_COURS'}" class="badge-encours">🔵 En cours</span>
                        <span th:if="${pret.etat == 'RENDU'}" class="badge-rendu">✅ Rendu</span>
                        <span th:if="${pret.etat == 'EN_RETARD'}" class="badge-retard">⚠️ En retard</span>
                    </td>
                    <td>
                        <a th:if="${pret.etat == 'EN_COURS' || pret.etat == 'EN_RETARD'}"
                           th:href="@{/prets/retour/{id}(id=${pret.id})}"
                           class="btn-retour me-1"
                           onclick="return confirm('Confirmer le retour ?')">
                            <i class="bi bi-check-circle"></i> Retour
                        </a>
                        <a th:href="@{/prets/delete/{id}(id=${pret.id})}"
                           class="btn-delete"
                           onclick="return confirm('Supprimer ce prêt ?')">
                            <i class="bi bi-trash"></i>
                        </a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(prets)}">
                    <td colspan="7" class="text-center py-4 text-muted">Aucun prêt trouvé</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<footer><p>📚 BiblioGestion — Développé avec Spring Boot & Thymeleaf</p></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
