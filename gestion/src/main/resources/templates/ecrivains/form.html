<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Écrivain - Formulaire</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #F7F6E5; font-family: 'Segoe UI', sans-serif; }
        .navbar { background-color: #36064D !important; }
        .navbar-brand, .nav-link { color: #F7F6E5 !important; font-weight: 600; }
        .nav-link:hover { color: #76D2DB !important; }
        .form-card {
            background: white; border-radius: 20px;
            box-shadow: 0 10px 40px rgba(54,6,77,0.15);
            padding: 40px; max-width: 550px;
            margin: 40px auto;
        }
        .form-title {
            color: #36064D; font-weight: 700;
            font-size: 24px; margin-bottom: 25px;
            text-align: center;
        }
        .form-label { color: #36064D; font-weight: 600; }
        .form-control {
            border: 2px solid #e0e0e0;
            border-radius: 10px; padding: 10px 14px;
        }
        .form-control:focus { border-color: #76D2DB; box-shadow: 0 0 0 3px rgba(118,210,219,0.3); }
        .btn-save {
            background: linear-gradient(135deg, #36064D, #76D2DB);
            color: white; border: none; border-radius: 10px;
            padding: 12px; font-weight: 700; font-size: 16px;
            width: 100%; transition: 0.3s;
        }
        .btn-save:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-cancel {
            background-color: #DA4848; color: white;
            border: none; border-radius: 10px;
            padding: 12px; font-weight: 700;
            width: 100%; text-decoration: none;
            display: block; text-align: center;
            transition: 0.3s; margin-top: 10px;
        }
        .btn-cancel:hover { background-color: #36064D; color: white; }
        .error { color: #DA4848; font-size: 13px; margin-top: 4px; }
        footer { background-color: #36064D; color: #F7F6E5; text-align: center; padding: 15px; margin-top: 50px; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="/"><i class="bi bi-book-half"></i> BiblioGestion</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/ecrivains"><i class="bi bi-person-lines-fill"></i> Écrivains</a></li>
                <li class="nav-item"><a class="nav-link" href="/ouvrages"><i class="bi bi-journals"></i> Ouvrages</a></li>
                <li class="nav-item"><a class="nav-link" href="/prets"><i class="bi bi-arrow-left-right"></i> Prêts</a></li>
                <li class="nav-item"><a class="nav-link" href="/prets/stats"><i class="bi bi-bar-chart-fill"></i> Statistiques</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <div class="form-card">
        <div class="form-title">
            <i class="bi bi-person-lines-fill" style="color:#76D2DB"></i>
            <span th:text="${ecrivain.id == null ? 'Nouvel Écrivain' : 'Modifier Écrivain'}"></span>
        </div>
        <form th:action="@{/ecrivains/save}" th:object="${ecrivain}" method="post">
            <input type="hidden" th:field="*{id}">
            <div class="mb-3">
                <label class="form-label">Nom complet</label>
                <input type="text" th:field="*{nom}" class="form-control" placeholder="Ex: Victor Hugo">
                <span class="error" th:if="${#fields.hasErrors('nom')}" th:errors="*{nom}"></span>
            </div>
            <div class="mb-4">
                <label class="form-label">Pays</label>
                <input type="text" th:field="*{pays}" class="form-control" placeholder="Ex: France">
                <span class="error" th:if="${#fields.hasErrors('pays')}" th:errors="*{pays}"></span>
            </div>
            <button type="submit" class="btn-save"><i class="bi bi-check-lg"></i> Enregistrer</button>
            <a href="/ecrivains" class="btn-cancel"><i class="bi bi-x-lg"></i> Annuler</a>
        </form>
    </div>
</div>

<footer><p>📚 BiblioGestion — Développé avec Spring Boot & Thymeleaf</p></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
